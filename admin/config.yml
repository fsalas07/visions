backend:
  name: github
  repo: fsalas07/visions
  branch: main
  base_url: https://visions-cms-proxy.fabiansalas1233.workers.dev
  auth_endpoint: /auth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "news"
    label: "News"
    folder: "_articles/news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Author Role", name: "author_role", widget: "string", default: "Staff Writer", hint: "e.g. Editor-in-Chief, Sports Editor, Staff Writer. Shown as “[Role] for Visions.” on the article page." }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "sports"
